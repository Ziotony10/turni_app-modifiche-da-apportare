<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3B82F6">
<title>Account – Gestione Turni</title>
<style>
  :root { --bg:#0F172A; --card:#1E293B; --card2:#263348; --border:#334155; --text:#E2E8F0; --muted:#94A3B8; --accent:#3B82F6; --radius:10px; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; display:flex; flex-direction:column; }

  /* ── HEADER ── */
  header { background:var(--card); border-bottom:1px solid var(--border); height:56px; padding:0 20px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:20; flex-shrink:0; }
  .page-title { width:230px; min-width:230px; font-size:1.05rem; font-weight:700; color:var(--text); white-space:nowrap; flex-shrink:0; }
  .page-title span { color:var(--accent); }
  .top-nav { display:flex; gap:4px; align-items:center; }
  .top-nav a { color:var(--muted); text-decoration:none; font-size:0.82rem; padding:5px 10px; border-radius:8px; background:var(--card2); white-space:nowrap; transition:color .15s, background .15s; }
  .top-nav a:hover { color:var(--text); background:#2d3f55; }
  .top-nav a#adminNavLink { display:none; color:#F59E0B; }
  .header-controls { display:flex; align-items:center; gap:8px; margin-left:auto; }
  .user-menu { position:relative; }
  .user-btn { display:flex; align-items:center; gap:6px; background:var(--card2); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:5px 10px; font-size:0.82rem; cursor:pointer; height:32px; transition:background .15s; }
  .user-btn:hover { background:#2d3f55; }
  .user-btn .avatar { width:20px; height:20px; border-radius:50%; background:var(--accent); color:white; font-size:0.65rem; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .user-dropdown { display:none; position:absolute; right:0; top:calc(100% + 6px); background:var(--card); border:1px solid var(--border); border-radius:10px; min-width:200px; z-index:200; box-shadow:0 8px 24px rgba(0,0,0,.4); overflow:hidden; }
  .user-dropdown.open { display:block; }
  .ud-header { padding:12px 14px; background:var(--card2); border-bottom:1px solid var(--border); font-size:0.78rem; color:var(--muted); }
  .ud-header strong { display:block; color:var(--text); font-size:0.9rem; margin-bottom:2px; }
  .ud-item { display:flex; align-items:center; gap:8px; padding:10px 14px; font-size:0.85rem; cursor:pointer; color:var(--text); transition:background .1s; }
  .ud-item:hover { background:var(--card2); }
  .ud-item.danger { color:#FCA5A5; }
  .ud-item.danger:hover { background:rgba(239,68,68,.1); }
  .ud-sep { height:1px; background:var(--border); margin:2px 0; }
  @media(max-width:768px) { .top-nav{display:none!important;} header{height:48px;padding:0 12px;} .page-title{min-width:0;font-size:0.9rem;} }

  /* ── CONTENUTO ── */
  .container { max-width:560px; margin:40px auto; padding:0 24px; display:flex; flex-direction:column; gap:20px; flex:1; }
  .acc-hero { display:flex; align-items:center; gap:16px; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:24px; }
  .acc-avatar { width:56px; height:56px; border-radius:50%; background:var(--accent); color:white; font-size:1.4rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .acc-info strong { display:block; font-size:1.05rem; font-weight:700; margin-bottom:4px; }
  .acc-info span { font-size:0.85rem; color:var(--muted); }
  .acc-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:24px; }
  .acc-card h3 { font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:20px; }
  .acc-field { margin-bottom:16px; }
  .acc-field label { display:block; font-size:0.75rem; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; }
  .acc-field input[type=password] {
    width:100%; background:var(--card2); border:1px solid var(--border);
    color:var(--text); border-radius:8px; padding:10px 12px;
    font-size:0.9rem; outline:none; transition:border-color .15s;
  }
  .acc-field input[type=password]:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(59,130,246,.15); }
  .acc-msg { font-size:0.82rem; margin:12px 0 4px; min-height:18px; }
  .btn-save { background:var(--accent); color:white; border:none; border-radius:8px; padding:10px 24px; font-size:0.9rem; font-weight:700; cursor:pointer; width:100%; margin-top:4px; transition:background .15s; }
  .btn-save:hover { background:#2563EB; }
  .btn-back { display:inline-flex; align-items:center; gap:6px; color:var(--muted); text-decoration:none; font-size:0.85rem; margin-bottom:8px; transition:color .15s; }
  .btn-back:hover { color:var(--text); }

  /* ── BOTTOM NAV ── */
  .bottom-nav { display:none; position:fixed; bottom:0; left:0; right:0; z-index:50; background:var(--card); border-top:1px solid var(--border); padding:6px 0 env(safe-area-inset-bottom,6px); }
  .bottom-nav-inner { display:flex; justify-content:space-around; align-items:stretch; }
  .bottom-nav a { display:flex; flex-direction:column; align-items:center; gap:2px; color:var(--muted); text-decoration:none; font-size:0.6rem; font-weight:600; padding:4px 6px; flex:1; text-align:center; }
  .bottom-nav a.active { color:var(--accent); }
  .bottom-nav a span.icon { font-size:1.2rem; line-height:1; }
  #adminMobileBtn { display:none; color:#F59E0B !important; }
  @media(max-width:768px) { .bottom-nav{display:block;} body{padding-bottom:64px;} }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: transparent; border-radius: 10px; transition: background .2s; }
  * { scrollbar-width: thin; scrollbar-color: transparent transparent; }
  :hover::-webkit-scrollbar-thumb { background: var(--border); }
  html:hover { scrollbar-color: var(--border) transparent; }
</style>
</head>
<body>

<header>
  <div class="page-title">👤 <span>Account</span></div>
      <nav class="top-nav">
    <a href="/">📅 Calendario</a>
    <a href="/riepilogo.html">📊 Riepilogo</a>
    <a href="/bustapaga.html">💶 Busta Paga</a>
    <a href="/turni-team.html">👥 Team</a>
    <a href="/admin.html" id="adminNavLink">🔧 Admin</a>
  </nav>
  <div class="header-controls">
    <div class="user-menu">
      <button class="user-btn" onclick="toggleUserMenu(event)" id="userBtn">
        <div class="avatar" id="userAvatar">?</div>
        <span id="userNameLabel">—</span>
        <span style="font-size:0.65rem;color:var(--muted)">▼</span>
      </button>
      <div class="user-dropdown" id="userDropdown">
        <div class="ud-header"><strong id="udName">—</strong><span id="udUsername"></span></div>
        <div class="ud-item" onclick="window.location.href='/impostazioni.html'">👤 Account</div>
        <div class="ud-sep"></div>
        <div class="ud-item danger" onclick="logout()">↩ Esci</div>
      </div>
    </div>
  </div>
</header>

<div class="container">
  <a href="/" class="btn-back">← Torna al calendario</a>

  <div class="acc-hero">
    <div class="acc-avatar" id="bigAvatar">?</div>
    <div class="acc-info">
      <strong id="infoNome">—</strong>
      <span id="infoUsername"></span>
    </div>
  </div>

  <div class="acc-card">
    <h3>🔑 Cambia password</h3>
    <div class="acc-field">
      <label>Password attuale</label>
      <input type="password" id="pwdOld" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="acc-field">
      <label>Nuova password</label>
      <input type="password" id="pwdNew" placeholder="min 6 caratteri" autocomplete="new-password">
    </div>
    <div class="acc-field">
      <label>Conferma nuova password</label>
      <input type="password" id="pwdConfirm" placeholder="ripeti la nuova password" autocomplete="new-password"
             onkeydown="if(event.key==='Enter') cambiaPwd()">
    </div>
    <div class="acc-msg" id="pwdMsg"></div>
    <button class="btn-save" onclick="cambiaPwd()">Salva nuova password</button>
  </div>
</div>

<nav class="bottom-nav"><div class="bottom-nav-inner">
  <a href="/"><span class="icon">🗓</span><span>Turni</span></a>
  <a href="/riepilogo.html"><span class="icon">📊</span><span>Riepilogo</span></a>
  <a href="/bustapaga.html"><span class="icon">💶</span><span>Busta</span></a>
  <a href="/impostazioni.html" class="active"><span class="icon">👤</span><span>Account</span></a>
  <a href="/admin.html" id="adminMobileBtn"><span class="icon">🔧</span><span>Admin</span></a>
</div></nav>

<script>
function getToken() { return localStorage.getItem('token'); }
function logout()   { localStorage.clear(); window.location.href='/login.html'; }

const _origFetch = window.fetch.bind(window);
window.fetch = function(url, opts={}) {
  const token = getToken();
  if (token && typeof url==='string' && url.startsWith('/api/')) {
    opts.headers = { ...(opts.headers||{}), 'Authorization': 'Bearer '+token };
  }
  return _origFetch(url, opts).then(res => {
    if (res.status===401 && typeof url==='string' && url.startsWith('/api/')) { logout(); throw new Error(); }
    return res;
  });
};

function toggleUserMenu(e) {
  e.stopPropagation();
  document.getElementById('userDropdown').classList.toggle('open');
}
document.addEventListener('click', () => document.getElementById('userDropdown')?.classList.remove('open'));

function showMsg(txt, color) {
  const msg = document.getElementById('pwdMsg');
  msg.textContent = txt; msg.style.color = color; msg.style.display = 'block';
}

async function cambiaPwd() {
  const old = document.getElementById('pwdOld').value;
  const nw  = document.getElementById('pwdNew').value;
  const cnf = document.getElementById('pwdConfirm').value;
  document.getElementById('pwdMsg').style.display = 'none';
  if (!old || !nw || !cnf) { showMsg('⚠️ Compila tutti i campi', '#F59E0B'); return; }
  if (nw.length < 6)       { showMsg('⚠️ Minimo 6 caratteri', '#F59E0B'); return; }
  if (nw !== cnf)          { showMsg('⚠️ Le password non coincidono', '#EF4444'); return; }
  const res = await fetch('/api/auth/change-password', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ password_attuale: old, nuova_password: nw })
  }).then(r=>r.json()).catch(()=>({ok:false}));
  if (res.ok) {
    showMsg('✅ Password cambiata con successo!', '#34D399');
    ['pwdOld','pwdNew','pwdConfirm'].forEach(id => document.getElementById(id).value = '');
  } else {
    showMsg('❌ ' + (res.detail || 'Password attuale non corretta'), '#EF4444');
  }
}

(async function() {
  if (!getToken()) { window.location.href='/login.html'; return; }
  try {
    const me = await fetch('/api/auth/me').then(r=>r.json());
    if (!me || !me.id) { logout(); return; }
    const nome = me.nome || me.username || '';
    const initiali = nome.split(' ').map(p=>p[0]||'').join('').slice(0,2).toUpperCase();
    document.getElementById('userNameLabel').textContent = nome.split(' ')[0];
    document.getElementById('userAvatar').textContent = initiali || '?';
    document.getElementById('udName').textContent = nome;
    document.getElementById('udUsername').textContent = me.username;
    document.getElementById('bigAvatar').textContent = initiali || '?';
    document.getElementById('infoNome').textContent = nome;
    document.getElementById('infoUsername').textContent = me.username;
    if (me.is_admin) {
      const lnk = document.getElementById('adminNavLink');
      if (lnk) lnk.style.setProperty('display','inline-block','important');
      const mbl = document.getElementById('adminMobileBtn');
      if (mbl) mbl.style.setProperty('display','flex','important');
    }
  } catch(e) { logout(); }
})();

setInterval(async () => { try { await fetch('/api/config'); } catch(e) {} }, 5*60*1000);
</script>
</body>
</html>
