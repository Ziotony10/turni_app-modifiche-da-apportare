  .container { padding:24px; overflow-x:auto; }

  /* ── TABELLA RIEPILOGO ── */
  .riepilogo-table { width:100%; border-collapse:collapse; min-width:900px; }

  .riepilogo-table th {
    background:var(--card2); color:var(--muted); font-size:0.72rem;
    font-weight:700; text-transform:uppercase; letter-spacing:.05em;
    padding:10px 10px; text-align:center; position:sticky; top:0; z-index:2;
    border:1px solid var(--border);
  }
  .riepilogo-table th.label-col { text-align:left; min-width:160px; }
  .riepilogo-table th.mese-col { min-width:72px; }
  .riepilogo-table th.tot-col { background:#1E3A5F; color:#93C5FD; min-width:80px; }

  .riepilogo-table td {
    padding:8px 10px; border:1px solid var(--border);
    font-size:0.82rem; text-align:center; font-variant-numeric:tabular-nums;
  }
  .riepilogo-table td.label-col {
    text-align:left; font-weight:600; color:var(--muted);
    background:#1E293B; font-size:0.8rem; position:sticky; left:0; z-index:2;

  }
  .riepilogo-table th.label-col {
    text-align:left; min-width:150px; position:sticky; left:0; z-index:3;
    background:#263348; box-shadow: 3px 0 8px rgba(0,0,0,0.6);
  }
  .riepilogo-table td.tot-col { background:#172033; color:#60A5FA; font-weight:700; }
  .riepilogo-table td.zero { color:var(--border); }

  /* Sezioni della tabella */
  .riepilogo-table tr.section-header td {
    background:#263348; color:var(--accent); font-weight:700;
    font-size:0.75rem; text-transform:uppercase; letter-spacing:.06em;
    padding:12px 10px;
  }
  .riepilogo-table tr.section-header td.label-col {
    background:#263348; color:var(--accent);
  }

  /* Riga totali */
  .riepilogo-table tr.total-row td {
    background:#1a2840; font-weight:700; color:var(--text);
  }
  .riepilogo-table tr.total-row td.label-col {

  }
  .riepilogo-table tr.total-row td.tot-col {
    background:#1a3060; color:#60A5FA;
  }

  .v-purple { color:#A78BFA; }
  .v-yellow { color:#F59E0B; }
  .v-pink   { color:#EC4899; }
  .v-green  { color:#34D399; }
  .v-red    { color:#F87171; }
  .v-teal   { color:#2DD4BF; }

  /* Mese corrente evidenziato */

<script>
const MESI = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
let anno = new Date().getFullYear();
const meseCorrente = new Date().getMonth() + 1;

// ── INIT ────────────────────────────────────────────────────────────────────
function initSelAnno() {
  const sel = document.getElementById('selAnno');
  for (let y = 2024; y <= 2030; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if (y === anno) o.selected = true;
    sel.appendChild(o);
  }
  sel.onchange = () => { anno = parseInt(sel.value);     if (me.is_admin) {
      const lnk = document.getElementById('adminNavLink');
      if (lnk) { lnk.style.setProperty('display', 'inline-block', 'important'); }
      const mbl = document.getElementById('adminMobileBtn');
      if (mbl) { mbl.style.setProperty('display', 'flex', 'important'); }
      localStorage.setItem('is_admin', 'true');
    } else {
      localStorage.removeItem('is_admin');
    }
    load(); };
}

function changeAnno(d) {
  anno = parseInt(document.getElementById('selAnno').value) + d;
  document.getElementById('selAnno').value = anno;
  load();
}

function fmtH(h) {
  if (!h) return null;
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  return `${hh}:${String(mm).padStart(2,'0')}`;
}

function cell(val, cls = '') {
  if (val === null || val === undefined || val === 0 || val === '0:00')
    return `<td class="zero ${cls}">—</td>`;
  return `<td class="${cls}">${val}</td>`;
}

function cellH(val, colorCls = '', extraCls = '') {
  const f = fmtH(val);
  if (!f || val === 0) return `<td class="zero ${extraCls}">—</td>`;
  return `<td class="${colorCls} ${extraCls}">${f}</td>`;
}

function cellN(val, colorCls = '', extraCls = '') {
  if (!val || val === 0) return `<td class="zero ${extraCls}">—</td>`;
  return `<td class="${colorCls} ${extraCls}">${val}</td>`;
}

// ── CARICA DATI ──────────────────────────────────────────────────────────────
async function load() {
  document.getElementById('body').innerHTML = '<div class="loading">Caricamento…</div>';
  const data = await fetch(`/api/riepilogo/${anno}`).then(r => r.json());
  render(data);
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(data) {
  const mesiCols = MESI.map((m, i) => {
    const isCurr = (i + 1 === meseCorrente) && (anno === new Date().getFullYear());
    return { label: m, idx: i + 1, curr: isCurr };
  });

  // Calcola totali annuali
  const tot = {};
  const campi = ['ore_diurne','ore_notturne','strao_diurno','strao_notturno',
                 'strao_fest_diurno','strao_fest_notturno',
                 'reperibilita_feriale','reperibilita_semifestiva','reperibilita_festiva',
                 'mal','ferie','rc','r','rot','rf'];
  for (const c of campi) {
    tot[c] = Object.values(data).reduce((s, m) => s + (m[c] || 0), 0);
  }
  tot.ore_tot     = tot.ore_diurne + tot.ore_notturne;
  tot.strao_fer   = tot.strao_diurno + tot.strao_notturno;
  tot.strao_fest  = tot.strao_fest_diurno + tot.strao_fest_notturno;
  tot.strao_tot   = tot.strao_fer + tot.strao_fest;
  tot.rep_tot     = tot.reperibilita_feriale + tot.reperibilita_semifestiva + tot.reperibilita_festiva;

  // Per ogni mese calcola i subtotali
  function m(idx) { return data[idx] || {}; }
  function mOreOrd(idx) { return (m(idx).ore_diurne||0) + (m(idx).ore_notturne||0); }
  function mStraoFer(idx) { return (m(idx).strao_diurno||0) + (m(idx).strao_notturno||0); }
  function mStraoFest(idx) { return (m(idx).strao_fest_diurno||0) + (m(idx).strao_fest_notturno||0); }
  function mStraoTot(idx) { return mStraoFer(idx) + mStraoFest(idx); }
  function mRepTot(idx) { return (m(idx).reperibilita_feriale||0)+(m(idx).reperibilita_semifestiva||0)+(m(idx).reperibilita_festiva||0); }

  const mc = (idx) => mesiCols[idx-1].curr ? 'mese-corrente' : '';

  // Header mesi
  const thMesi = mesiCols.map(m =>
    `<th class="mese-col ${m.curr ? 'mese-corrente' : ''}">${m.label}</th>`
  ).join('');

  const html = `
  <table class="riepilogo-table">
    <thead>
      <tr>
        <th class="label-col">Voce</th>
        ${thMesi}
        <th class="tot-col">Totale</th>
      </tr>
    </thead>
    <tbody>

      <!-- ORE ORDINARIE -->
      <tr class="section-header">
        <td class="label-col">⏱ Ore Ordinarie</td>
        ${mesiCols.map(({idx}) => `<td class="${mc(idx)}"></td>`).join('')}
        <td class="tot-col"></td>
      </tr>
      <tr>
        <td class="label-col">Totale ordinario</td>
        ${mesiCols.map(({idx}) => cellH(mOreOrd(idx), 'v-blue', mc(idx))).join('')}
        ${cellH(tot.ore_diurne + tot.ore_notturne, 'v-blue', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">↳ Diurne</td>
        ${mesiCols.map(({idx}) => cellH(m(idx).ore_diurne, '', mc(idx))).join('')}
        ${cellH(tot.ore_diurne, '', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">↳ Notturne</td>
        ${mesiCols.map(({idx}) => cellH(m(idx).ore_notturne, 'v-purple', mc(idx))).join('')}
        ${cellH(tot.ore_notturne, 'v-purple', 'tot-col')}
      </tr>

      <!-- STRAORDINARI -->
      <tr class="section-header">
        <td class="label-col">⚡ Straordinari</td>
        ${mesiCols.map(({idx}) => `<td class="${mc(idx)}"></td>`).join('')}
        <td class="tot-col"></td>
      </tr>
      <tr class="total-row">
        <td class="label-col">Totale straordinari</td>
        ${mesiCols.map(({idx}) => cellH(mStraoTot(idx), 'v-yellow', mc(idx))).join('')}
        ${cellH(tot.strao_tot, 'v-yellow', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">↳ Feriale diurno</td>
        ${mesiCols.map(({idx}) => cellH(m(idx).strao_diurno, '', mc(idx))).join('')}
        ${cellH(tot.strao_diurno, '', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">↳ Feriale notturno</td>
        ${mesiCols.map(({idx}) => cellH(m(idx).strao_notturno, 'v-purple', mc(idx))).join('')}
        ${cellH(tot.strao_notturno, 'v-purple', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">↳ Festivo diurno</td>
        ${mesiCols.map(({idx}) => cellH(m(idx).strao_fest_diurno, 'v-pink', mc(idx))).join('')}
        ${cellH(tot.strao_fest_diurno, 'v-pink', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">↳ Festivo notturno</td>
        ${mesiCols.map(({idx}) => cellH(m(idx).strao_fest_notturno, 'v-pink', mc(idx))).join('')}
        ${cellH(tot.strao_fest_notturno, 'v-pink', 'tot-col')}
      </tr>

      <!-- REPERIBILITÀ -->
      <tr class="section-header">
        <td class="label-col">🔔 Reperibilità</td>
        ${mesiCols.map(({idx}) => `<td class="${mc(idx)}"></td>`).join('')}
        <td class="tot-col"></td>
      </tr>
      <tr class="total-row">
        <td class="label-col">Totale reperibilità</td>
        ${mesiCols.map(({idx}) => cellN(mRepTot(idx), 'v-green', mc(idx))).join('')}
        ${cellN(tot.rep_tot, 'v-green', 'tot-col')}
      </tr>
      <tr>
        <td class="label-col">🔵 Feriale</td>

// ── AUTH ─────────────────────────────────────────────────────────────────────
function getToken()  { return localStorage.getItem('token'); }
function getNome()   { return localStorage.getItem('nome') || localStorage.getItem('username') || ''; }
function logout()    { localStorage.removeItem('token'); localStorage.removeItem('username'); localStorage.removeItem('nome'); window.location.href='/login.html'; }

const _origFetch = window.fetch.bind(window);
window.fetch = function(url, opts={}) {
  const token = getToken();
  if (token && typeof url === 'string' && url.startsWith('/api/')) {
    opts.headers = { ...(opts.headers||{}), 'Authorization': 'Bearer ' + token };
  }
  return _origFetch(url, opts).then(res => {
    if (res.status === 401 && typeof url === 'string' && url.startsWith('/api/')) {
      logout(); throw new Error('Non autorizzato');
    }
    return res;
  });
};

(async function() {
  if (!getToken()) { window.location.href='/login.html'; return; }
  try {
    const me = await fetch('/api/auth/me').then(r => r.json());
    if (!me || !me.id) { logout(); return; }
    // user label handled by menu
    
    // Aggiorna user menu
    const nome = me.nome || me.username || '';
    const initiali = nome.split(' ').map(p=>p[0]||'').join('').slice(0,2).toUpperCase();
    const el = document.getElementById('userNameLabel'); if(el) el.textContent = nome.split(' ')[0];
    const av = document.getElementById('userAvatar'); if(av) av.textContent = initiali || '?';
    const ud = document.getElementById('udName'); if(ud) ud.textContent = nome;
    const uu = document.getElementById('udUsername'); if(uu) uu.textContent = me.username;
        if (me.is_admin) {
      const lnk = document.getElementById('adminNavLink');
      if (lnk) { lnk.style.setProperty('display', 'inline-block', 'important'); }
      const mbl = document.getElementById('adminMobileBtn');
      if (mbl) { mbl.style.setProperty('display', 'flex', 'important'); }
      localStorage.setItem('is_admin', 'true');
    }
    initSelAnno();
    load();
  } catch(e) { console.error('Auth error:', e); logout(); }
})();

// ── ACCOUNT MODAL ─────────────────────────────────────────────────────────────
function openAccModal() {
  document.getElementById('userDropdown')?.classList.remove('open');
  document.getElementById('accOverlay').classList.add('open');
  ['accPwdOld','accPwdNew','accPwdConfirm'].forEach(id => {
    const el = document.getElementById(id); if(el) el.value='';
  });
  const msg = document.getElementById('accMsg'); if(msg){msg.textContent='';msg.style.color='';}
  setTimeout(() => document.getElementById('accPwdOld')?.focus(), 100);
}
function closeAccModal() {
  document.getElementById('accOverlay').classList.remove('open');
}
async function doChangePwd() {
  const old = document.getElementById('accPwdOld').value;
  const nw  = document.getElementById('accPwdNew').value;
  const cnf = document.getElementById('accPwdConfirm').value;
  const msg = document.getElementById('accMsg');
  msg.textContent = '';
  if (!old || !nw || !cnf) { msg.textContent='⚠️ Compila tutti i campi'; msg.style.color='#F59E0B'; return; }
  if (nw.length < 6)       { msg.textContent='⚠️ Minimo 6 caratteri'; msg.style.color='#F59E0B'; return; }
  if (nw !== cnf)          { msg.textContent='⚠️ Le password non coincidono'; msg.style.color='#EF4444'; return; }
  const res = await fetch('/api/auth/change-password', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ password_attuale: old, nuova_password: nw })
  }).then(r=>r.json()).catch(()=>({ok:false}));
  if (res.ok) {
    msg.textContent='✅ Password cambiata!'; msg.style.color='#34D399';
    setTimeout(closeAccModal, 1500);
  } else {
    msg.textContent='❌ ' + (res.detail||'Password attuale non corretta'); msg.style.color='#EF4444';
  }
}
